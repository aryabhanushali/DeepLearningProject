model:
  name: resnet18
  pretrained: false
  num_classes: 10

data:
  dataset: cifar10
  data_dir: ./data
  batch_size: 128
  num_workers: 0
  augment: true
  subset_frac: 0.2

train:
  epochs: 20
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  lr_scheduler: cosine

# Best combination: layer3 targeting + smooth-only loss.
# layer3 targeting recovered 7.3pp, smooth-only recovered 4.6pp independently.
# Grid: 16x16 = 256 channels in layer3.
loss:
  type: smooth_only
  lambda_smooth: 0.01
  lambda_comp: 0.0
  grid_h: 16
  grid_w: 16
  target_layer: layer3

output:
  exp_dir: ./experiments
  save_best: true
