# Model
model:
  name: resnet18
  pretrained: false
  num_classes: 10

# Data
data:
  dataset: cifar10
  data_dir: ./data
  batch_size: 128
  num_workers: 4
  augment: true

# Training
train:
  epochs: 100
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 5e-4
  lr_scheduler: cosine

# Structured loss
loss:
  lambda_smooth: 0.01   # weight for local smoothness term
  lambda_comp: 0.001    # weight for global competition term
  grid_h: 8             # height of channel grid (8x64 = 512 channels for ResNet18 layer4)
  grid_w: 8
  target_layer: layer4  # which ResNet layer to regularize

# Logging / output
output:
  exp_dir: ./experiments
  log_interval: 50      # steps between console logs
  save_best: true
