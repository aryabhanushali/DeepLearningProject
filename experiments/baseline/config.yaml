# Model
model:
  name: resnet18
  pretrained: false
  num_classes: 10

# Data
data:
  dataset: cifar10
  data_dir: ./data
  batch_size: 128
  num_workers: 0
  augment: true
  subset_frac: 1.0

# Training
train:
  epochs: 20
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  lr_scheduler: cosine

# Structured loss
loss:
  lambda_smooth: 0.01   # weight for local smoothness term
  lambda_comp: 0.001    # weight for global competition term
  grid_h: 16            # 16x32 = 512 channels in ResNet18 layer4
  grid_w: 32
  target_layer: layer4

# Logging / output
output:
  exp_dir: ./experiments
  save_best: true
