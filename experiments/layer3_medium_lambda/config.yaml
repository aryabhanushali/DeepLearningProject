model:
  name: resnet18
  pretrained: false
  num_classes: 10

data:
  dataset: cifar10
  data_dir: ./data
  batch_size: 128
  num_workers: 0
  augment: true
  subset_frac: 1.0

train:
  epochs: 20
  optimizer: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  lr_scheduler: cosine

loss:
  type: smooth_only
  lambda_smooth: 0.1
  lambda_comp: 0.0
  warmup_epochs: 5
  grid_h: 16
  grid_w: 16
  target_layer: layer3

output:
  exp_dir: ./experiments
  save_best: true
